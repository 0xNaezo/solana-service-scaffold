name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.lock'

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-audit binary
        uses: taiki-e/install-action@cargo-audit
      - name: Run audit
        run: cargo audit
